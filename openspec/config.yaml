schema: spec-driven

context: |
  Tech stack: Next.js 16, TypeScript, Tailwind v4, Zustand 5, date-fns 4
  Architecture: App Router, features-based components
  Testing: Not found (Unavailable)
  Style: ESLint, Prettier

strict_tdd: false

rules:
  proposal:
    - Include fixes for functional errors first
    - Identify affected modules (store, components, lib)
  specs:
    - Use Given/When/Then format for scenarios
  design:
    - Document changes to store state and actions
  tasks:
    - Group by Phase (Foundation -> Implementation -> Integration)
  apply:
    - Follow AGENTS.md conventions
  verify:
    - Manual verification in browser since no test runner exists
  archive:
    - Ensure all tasks in tasks.md are checked [x]

testing:
  runner: null
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  quality:
    linter: eslint
    formatter: prettier
